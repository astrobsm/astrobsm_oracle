services:
  - type: web
    name: astrobsm-oracle-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && cd ../frontend/react-app && npm install && npm run build
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port 10000
    envVars:
      - key: DATABASE_URL
        value: <your_database_url>
      - key: SECRET_KEY
        value: <your_secret_key>
    plan: free
